<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0a2e"/>
      <stop offset="50%" style="stop-color:#0d1b3e"/>
      <stop offset="100%" style="stop-color:#0a2a1e"/>
    </linearGradient>
    <linearGradient id="star" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5ff59a"/>
      <stop offset="50%" style="stop-color:#4dc8ff"/>
      <stop offset="100%" style="stop-color:#ff6bda"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#star)" stroke-width="3" opacity="0.3"/>

  <!-- Star shape -->
  <g filter="url(#glow)" transform="translate(256,250)">
    <!-- Main star -->
    <polygon points="0,-120 28,-40 110,-40 45,10 70,90 0,45 -70,90 -45,10 -110,-40 -28,-40"
      fill="url(#star)" opacity="0.95"/>
    <!-- Inner highlight -->
    <polygon points="0,-60 14,-20 55,-20 22,5 35,45 0,22 -35,45 -22,5 -55,-20 -14,-20"
      fill="white" opacity="0.3"/>
  </g>

  <!-- N letter -->
  <text x="256" y="420" text-anchor="middle" font-family="Arial Black, sans-serif"
    font-size="60" font-weight="900" fill="white" opacity="0.8"
    letter-spacing="12">NOVA</text>
</svg>
